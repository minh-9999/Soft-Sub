name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      CARGO_BUILD_JOBS: 2
      RUST_BACKTRACE: 1

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.cargo\registry
            C:\Users\runneradmin\.cargo\git
            src-tauri\target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache node
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements-dev.txt

      - name: Run JavaScript tests
        run: npm test -- --run

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run Python tests
        run: pytest tools/tests

      - name: Build application
        run: npm run build

      - name: Fail if MSI missing
        shell: bash
        run: |
            shopt -s nullglob
            
            msi=(src-tauri/target/release/bundle/msi/*.msi)
            exe=(src-tauri/target/release/bundle/nsis/*.exe)

            if [ ${#msi[@]} -eq 0 ]; then
              echo "No MSI found"
              exit 1
            fi

            if [ ${#exe[@]} -eq 0 ]; then
              echo "No EXE found"
              exit 1
            fi

      - name: Show bundle output (debug)
        run: ls -R src-tauri/target/release/bundle
        
      - name: Build and create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: SoftSub ${{ github.ref_name }}
          body: |
            ## Changes

            See commit history for details.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
