name: CI

on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: windows-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      js: ${{ steps.filter.outputs.js }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
            python:
              - 'tools/**'
            js:
              - 'package.json'
              - 'package-lock.json'
              - 'src/**'
              - 'vitest.config.*'
              - 'vite.config.*'
              
  rust-test:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
        
      - name: Run pipeline test
        shell: bash
        run: |
          chmod +x tools/tests/test_pipeline.sh
          tools/tests/test_pipeline.sh
          
  python-test:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r tools/requirements-dev.txt
          pytest tools/tests
  
      - name: Ensure output dir
        shell: bash
        run: mkdir -p tests/output
  
      - name: Check file exists (debug)
        shell: bash
        run: ls tests/output
 
      - name: Find whisper binary
        shell: bash
        run: find whisper.cpp -type f
      
      - name: Generate SRT from audio
        run: |
          python tools/generate.py \
            tests/fixtures/audio/sample.wav \
            tests/output/out.srt
      
      - name: Regression check
        run: |
          python tools/tests/compare.py \
            tests/fixtures/expected/sample.srt \
            tests/output/out.srt
            
  js-test:
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test -- --run